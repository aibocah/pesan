<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Rumah Makan H. Imam</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b3d6e;
color:white;
padding-bottom:120px;
}

header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
}

.section{
padding:15px;
}

.section h2{
color:#ffd27a;
border-bottom:2px solid #ffd27a;
padding-bottom:5px;
}

.menu-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#134c86;
padding:10px;
margin:6px 0;
border-radius:8px;
}

button{
background:#ffd27a;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
color:black;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

.cart-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.qty-btn{
padding:2px 8px;
margin:0 3px;
}

.order-btn{
width:100%;
margin-top:10px;
background:green;
color:white;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<header>RUMAH MAKAN H. IMAM</header>

<div class="section">
<h2>MENU AYAM & LELE</h2>

<div class="menu-item">
<span>Ayam goreng - 10.000</span>
<button onclick="addItem('Ayam goreng',10000)">+</button>
</div>

<div class="menu-item">
<span>Ayam bakar - 10.000</span>
<button onclick="addItem('Ayam bakar',10000)">+</button>
</div>

<div class="menu-item">
<span>Lele goreng - 9.000</span>
<button onclick="addItem('Lele goreng',9000)">+</button>
</div>

<div class="menu-item">
<span>Lele bakar - 9.000</span>
<button onclick="addItem('Lele bakar',9000)">+</button>
</div>

<div class="menu-item">
<span>Ayam penyet - 10.000</span>
<button onclick="addItem('Ayam penyet',10000)">+</button>
</div>

<div class="menu-item">
<span>Ayam geprek - 9.000</span>
<button onclick="addItem('Ayam geprek',9000)">+</button>
</div>

</div>


<div class="cart">

<b>Keranjang</b>

<div id="cartList"></div>

<div id="total"></div>

<button class="order-btn" onclick="sendWA()">Pesan via WhatsApp</button>

</div>

<script>

let cart={}

function addItem(name,price){

if(!cart[name]){
cart[name]={qty:0,price:price}
}

cart[name].qty++

renderCart()

}

function changeQty(name,val){

cart[name].qty+=val

if(cart[name].qty<=0){
delete cart[name]
}

renderCart()

}

function renderCart(){

let list=document.getElementById("cartList")

let total=0

list.innerHTML=""

for(let item in cart){

let data=cart[item]

let subtotal=data.qty*data.price

total+=subtotal

list.innerHTML+=`
<div class="cart-item">
<span>${item}</span>
<div>
<button class="qty-btn" onclick="changeQty('${item}',-1)">-</button>
${data.qty}
<button class="qty-btn" onclick="changeQty('${item}',1)">+</button>
</div>
</div>
`

}

document.getElementById("total").innerHTML="<b>Total: Rp "+total+"</b>"

}

function sendWA(){

let text="Pesanan:%0A"

for(let item in cart){

text+=item+" x"+cart[item].qty+"%0A"

}

let url="https://wa.me/62895339847320?text="+text

window.open(url)

}

</script>

</body>
</html>
